<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Details | Pet Palace</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="detail.css">
</head>
<body id="detail-page">

    <header>
        <h1>Pet Palace Details</h1>
        <nav>
            <a href="products.html" class="back-btn">← Back to Shop</a>
        </nav>
    </header>

    <main class="detail-container">
        <section class="product-detail-view">
            <div class="product-image-large">
                <img id="detail-img" src="" alt="Loading...">
            </div>

            <div class="product-info-sheet">
                <h2 id="detail-name">Loading...</h2>
                <p class="price-large">₱<span id="detail-price">0.00</span></p>
                
                <div class="product-description">
                    <h3>About this product</h3>
                    <p>Experience the royal quality of Pet Palace. This item is carefully crafted for the best experience of your beloved pets.</p>
                </div>

                <div class="detail-actions">
                    <button id="detail-add-btn" class="add-to-cart-btn btn-large">
                        Add to Shopping Cart 🐾
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
